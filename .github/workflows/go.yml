name: Go

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        directory:
          - '.'
          - './plugin'
          - './wrappers/aead'
          - './wrappers/alicloudkms'
          - './wrappers/awskms'
          - './wrappers/azurekeyvault'
          - './wrappers/gcpckms'
          - './wrappers/huaweicloudkms'
          - './wrappers/kmip'
          - './wrappers/ocikms'
          - './wrappers/pkcs11'
          - './wrappers/static'
          - './wrappers/tencentcloudkms'
          - './wrappers/transit'
          # - './kms/pkcs11'
          - './kms/transit'
        go: ["1.25"]
        platform: [ubuntu-latest] # can not run in macOS and Windows
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for Dockerfile
        id: dockerfile
        working-directory: ${{ matrix.directory }}
        run: |-
          if [[ -f Dockerfile ]]; then
            echo exists=true >> $GITHUB_OUTPUT
          else
            echo exists=false >> $GITHUB_OUTPUT
          fi

      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        if: steps.dockerfile.outputs.exists == 'false'
        with:
          go-version: ${{ matrix.go }}
          cache-dependency-path: ${{ matrix.directory }}/go.mod

      - name: Tests
        if: steps.dockerfile.outputs.exists == 'false'
        working-directory: ${{ matrix.directory }}
        run: go test ./...

      - name: Container tests
        if: steps.dockerfile.outputs.exists == 'true'
        run: docker build -f '${{ matrix.directory }}/Dockerfile' .
